<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovphil links</title>
    <style>
        body {
            /* Smooth background gradient matching Linktree style */
            background: linear-gradient(to bottom, #afafaf, #0e007b);
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .profile {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background-color: #ffffff;
            border-radius: 50%;
            margin: 0 auto 15px;
        }
        .username {
            font-weight: bold;
            color: #ffffff;
            font-size: 1.2rem;
        }
        .links-container {
            width: 100%;
            max-width: 600px;
        }
        .link-button {
            display: block;
            background-color: white;
            color: #333;
            text-align: center;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .link-button:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="profile">
        <img src="https://i.postimg.cc/Kc0D2qGz/INNOVPHIL-LOGO.png" class="avatar" alt="Innovphil Logo">
        <div class="username">INNOVPHIL</div>
    </div>

    <div class="links-container">
        <a href="https://facebook.com" class="link-button" onclick="trackClick(event, 'Innovphill', this.href)">Innovphill</a>
        <a href="https://facebook.combicol/" class="link-button" onclick="trackClick(event, 'Innovphi Bicol Business Center', this.href)">Innovphi Bicol Business Center</a>
        <a href="https://facebook.comEnglishLearningAcademy/" class="link-button" onclick="trackClick(event, 'Innovphil English Learning Academy', this.href)">Innovphil English Learning Academy</a>
        <a href="https://facebook.com" class="link-button" onclick="trackClick(event, 'Life.Save by Innovphil', this.href)">Life.Save by Innovphil</a>
        <a href="https://instagram.com" class="link-button" onclick="trackClick(event, 'Instagram', this.href)">Instagram</a>
    </div>

     <!-- 1. Vercel Web Analytics Tracking Script -->
     <script defer src="/_vercel/insights/script.js"></script>

     <!-- 2. Fixed Helper Script to ensure clicks register before redirecting -->
     <script>
         window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
         
         function trackClick(event, buttonName, targetUrl) {
             // Prevent the browser from instantly opening the new window tab
             event.preventDefault();
 
             // Fire the tracking event directly to your Vercel Dashboard
             va('event', { name: 'button_click', data: { button: buttonName } });
 
             // Provide a 150-millisecond delay window to ensure Vercel records the request payload
             setTimeout(() => {
                 window.open(targetUrl, '_blank', 'noopener,noreferrer');
             }, 150);
         }
     </script>
</body>
    

</body>
</html>
