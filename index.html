<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>johnpaulramos0705 Links</title>
    <style>
        body {
            /* Smooth background gradient matching Linktree style */
            background: linear-gradient(to bottom, #d3d3d3, #002F6C);
            margin: 0;
            padding: 40px 20px;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .profile {
            text-align: center;
            margin-bottom: 30px;
        }
        .avatar {
            width: 96px;
            height: 96px;
            background-color: #fff;
            border-radius: 50%;
            margin: 0 auto 15px;
        }
        .username {
            font-weight: bold;
            color: #333;
            font-size: 1.2rem;
        }
        .links-container {
            width: 100%;
            max-width: 600px;
        }
        .link-button {
            display: block;
            background-color: white;
            color: #333;
            text-align: center;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .link-button:hover {
            transform: scale(1.02);
        }
  
    </style>
</head>
<body>

    <div class="profile">
         <img src="https://i.postimg.cc/Kc0D2qGz/INNOVPHIL-LOGO.png" class="avatar">
